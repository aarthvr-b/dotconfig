# This is my tmux configuration

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Status bar minimal
set -g status-style "bg=default, fg=colour7"
set -g status-left '#[bold]#S'
set -g status-right '#[dim]#{pane_current_path} | %H:%M'

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour12"

set -g message-style "bg=colour0,fg=colour7"

# Let Ghostty handle selection and scrollback.
set -g mouse off
set -g alternate-screen off
# Also strip alt-screen capabilities from child apps inside tmux.
set -ga terminal-overrides ',*:smcup@:rmcup@'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Binding movement between windows
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

bind -n M-H previous-window
bind -n M-L next-window
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✅ Tmux config reloaded!"
source-file ~/.config/tmux/vague.conf

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# set vi mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind v copy-mode

run '~/.tmux/plugins/tpm/tpm'
